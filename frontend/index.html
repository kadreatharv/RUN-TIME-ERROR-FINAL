<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunTime Error // SATA</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-dim: #999999;
            --accent-green: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Interactive Cursor Glow */
        .cursor-glow {
            position: fixed;
            top: -250px;
            left: -250px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transition: transform 0.15s ease-out;
        }

        .content-wrapper {
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 2s ease-out;
            pointer-events: none; /* Let clicks pass through to button */
        }

        .badge {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-green);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 0.5rem;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; text-shadow: 0 0 2px transparent; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--accent-green); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            max-width: 900px;
            min-height: 120px; /* Prevent layout shift while typing */
        }
        
        .cursor-blink {
            border-right: 4px solid var(--accent-green);
            animation: blink 0.7s infinite;
        }
        
        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: var(--accent-green); }
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--accent-green);
            margin: 0.5rem auto;
            opacity: 0.7;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            font-weight: 300;
            max-width: 700px;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .launch-btn {
            margin-top: 2.5rem;
            padding: 1.2rem 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            pointer-events: auto; /* Enable clicking */
        }

        .launch-btn:hover {
            background: rgba(0, 255, 0, 0.05);
            border-color: rgba(0, 255, 0, 0.4);
            color: var(--accent-green);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
            transform: translateY(-2px);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            opacity: 0.6;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

    </style>
</head>
<body>
    <!-- Interactive Background -->
    <div class="cursor-glow" id="glow"></div>
    
    <div class="content-wrapper">
        <div class="badge">SYS.ONLINE</div>
        
        <h1 id="main-title"></h1>
        
        <div class="divider"></div>
        
        <p class="subtitle">
            <strong>Run Time Error</strong><br>
            An AI security system that monitors crypto transactions in real-time to instantly detect and block fraud before it happens.
        </p>

        <a href="dashboard.html" class="launch-btn">
            > LAUNCH SATA CORE _
        </a>
    </div>

    <div class="footer">
        Code Srijan Hackathon 2026
    </div>

    <script>
        // Smooth cursor tracking glow effect
        const glow = document.getElementById('glow');
        
        document.addEventListener('mousemove', (e) => {
            glow.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });

        // Typewriter Effect for Main Title
        const titleText = "AI-Powered Fraud Detection in Blockchain Transactions";
        const titleElement = document.getElementById("main-title");
        let i = 0;
        
        function typeWriter() {
            if (i < titleText.length) {
                titleElement.innerHTML = titleText.substring(0, i + 1) + '<span class="cursor-blink"></span>';
                i++;
                setTimeout(typeWriter, 50); // Typing speed
            } else {
                titleElement.innerHTML = titleText; // Remove cursor when done
            }
        }
        
        // Start typing after fade-in
        setTimeout(typeWriter, 500);
    </script>
</body>
</html>
