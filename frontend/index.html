<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Fraud Detection</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i>
                <h2>SecurePay</h2>
            </div>
            <nav>
                <ul>
                    <li class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</li>
                    <li><i class="fa-solid fa-money-bill-transfer"></i> Transactions</li>
                    <li><i class="fa-solid fa-gear"></i> Settings</li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p>Live API Connection</p>
                <div class="api-status online"><i class="fa-solid fa-circle"></i> Connected</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Fraud Detection Dashboard</h1>
                <div class="header-right">
                    <span class="date-display" id="current-date"></span>
                    <div class="profile-pic">Admin</div>
                </div>
            </header>

            <!-- Stats Row -->
            <section class="stats-grid">
                <div class="stat-card glass-panel">
                    <div class="stat-icon"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-info">
                        <h3>Total Scanned</h3>
                        <p id="total-count">0</p>
                    </div>
                </div>
                <div class="stat-card glass-panel danger">
                    <div class="stat-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-info">
                        <h3>Fraud Detected</h3>
                        <p id="fraud-count">0</p>
                    </div>
                </div>
                <div class="stat-card glass-panel success">
                    <div class="stat-icon"><i class="fa-solid fa-shield-check"></i></div>
                    <div class="stat-info">
                        <h3>Safe Transactions</h3>
                        <p id="safe-count">0</p>
                    </div>
                </div>
            </section>

            <!-- Main Layout: Charts + Form -->
            <section class="dashboard-layout">
                
                <!-- Left: Test Transaction Form -->
                <div class="test-panel glass-panel">
                    <div class="panel-header">
                        <h2><i class="fa-solid fa-flask"></i> Live Test</h2>
                        <p>Simulate a transaction</p>
                    </div>
                    <form id="transaction-form" onsubmit="event.preventDefault(); submitTransaction();">
                        <div class="form-group">
                            <label>Amount ($)</label>
                            <input type="number" id="amount" step="0.01" required placeholder="e.g. 500.00">
                        </div>
                        <div class="form-group">
                            <label>Sender ID</label>
                            <input type="text" id="sender" required placeholder="e.g. USR-1293">
                        </div>
                        <div class="form-group">
                            <label>Receiver ID</label>
                            <input type="text" id="receiver" required placeholder="e.g. MER-9421">
                        </div>
                        <div class="form-group">
                            <label>Transaction Type</label>
                            <select id="activity">
                                <option value="transfer">Bank Transfer</option>
                                <option value="purchase">Online Purchase</option>
                                <option value="crypto">Crypto Exchange</option>
                            </select>
                        </div>
                        <button type="submit" id="submit-btn" class="btn-primary">
                            <span class="btn-text">Analyze Transaction</span>
                            <i class="fa-solid fa-spinner fa-spin d-none" id="loading-spinner"></i>
                        </button>
                    </form>

                    <!-- Result Box -->
                    <div id="result-box" class="result-box d-none">
                        <h3 id="result-prediction">Fraud</h3>
                        <div class="risk-meter">
                            <span id="result-risk-level" class="risk-badge">High Risk</span>
                            <span id="result-probability" class="prob-text">98%</span>
                        </div>
                    </div>
                </div>

                <!-- Right: Charts -->
                <div class="charts-panel">
                    <div class="chart-container glass-panel">
                        <h2>Transaction Status</h2>
                        <div class="pie-wrapper">
                            <canvas id="fraudPieChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container glass-panel">
                        <h2>Recent Activity</h2>
                        <div class="line-wrapper">
                            <canvas id="activityLineChart"></canvas>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
